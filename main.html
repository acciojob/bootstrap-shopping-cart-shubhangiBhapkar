<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
	
</head>

<body>
	<div class="container mt-5">

  <!-- Heading -->
  <div class="block-heading">
    <h2>Shopping Cart</h2>
  </div>

  <div class="row">

    <!-- LEFT SIDE -->
    <div class="col-lg-8">

      <!-- Product 1 -->
      <div class="product">
        <div class="row align-items-center">

          <div class="col-md-2">
            <img src="https://via.placeholder.com/100" class="img-fluid">
            <img src="https://via.placeholder.com/100" class="img-fluid">
            <img src="https://via.placeholder.com/100" class="img-fluid">
          </div>

          <div class="col-md-6">
            <h5>Product Name</h5>
            <p>Display: 5 inch</p>
            <p>RAM: 4GB</p>
          </div>

          <div class="col-md-2">
            <input type="number" class="form-control" value="1">
          </div>

          <div class="col-md-2 price">
            ₹1200
          </div>

        </div>
      </div>

      <!-- Product 2 -->
      <div class="product">
        <div class="row align-items-center">

          <div class="col-md-2">
            <img src="https://via.placeholder.com/100" class="img-fluid">
            <img src="https://via.placeholder.com/100" class="img-fluid">
            <img src="https://via.placeholder.com/100" class="img-fluid">
          </div>

          <div class="col-md-6">
            <h5>Product Name</h5>
            <p>Display: 6 inch</p>
            <p>RAM: 6GB</p>
          </div>

          <div class="col-md-2">
            <input type="number" class="form-control" value="1">
          </div>

          <div class="col-md-2 price">
            ₹1500
          </div>

        </div>
      </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="col-lg-4">

      <div class="summary">
        <h3>Summary</h3>

        <div class="row">
          <div class="col">Subtotal</div>
          <div class="col text-end">₹2700</div>
        </div>

        <div class="row">
          <div class="col">Discount</div>
          <div class="col text-end">₹200</div>
        </div>

        <div class="row">
          <div class="col"><strong>Total</strong></div>
          <div class="col text-end"><strong>₹2500</strong></div>
        </div>

        <button>Checkout</button>
      </div>

    </div>

  </div>

</div>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
